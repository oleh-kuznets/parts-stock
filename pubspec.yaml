name: parts_stock
description: "Parts Stock — CSV pricelist converter for desktop."
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.11.4

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8
  csv: ^8.0.0
  file_picker: ^11.0.2
  file_selector: ^1.1.0
  path_provider: ^2.1.5
  intl: ^0.20.2
  path: ^1.9.1
  audioplayers: ^6.6.0
  desktop_drop: ^0.7.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0

flutter:
  uses-material-design: true
  assets:
    - assets/branding/
    - assets/sounds/
  fonts:
    # Bundled SF Pro (the same SFNS variable font macOS uses system-wide).
    # Shipping it as a Flutter asset gives us identical typography on
    # Windows / Linux too — the user explicitly asked for SF everywhere.
    - family: SF Pro
      fonts:
        - asset: assets/fonts/SFPro.ttf
        - asset: assets/fonts/SFProItalic.ttf
          style: italic
